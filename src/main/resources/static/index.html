<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chat Room</title>
  <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7/bundles/stomp.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f0f2f5; height: 100vh; display: flex; align-items: center; justify-content: center; }

    /* Auth */
    #auth-panel { background: white; padding: 32px; border-radius: 12px; width: 360px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
    #auth-panel h2 { text-align: center; margin-bottom: 24px; color: #1a1a2e; }
    #auth-panel input { width: 100%; padding: 10px 14px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
    #auth-panel button { width: 100%; padding: 11px; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; margin-bottom: 8px; }
    #btn-login { background: #4f46e5; color: white; }
    #btn-register { background: #e5e7eb; color: #374151; }
    #auth-error { color: red; font-size: 13px; text-align: center; margin-top: 8px; }

    /* App */
    #app { display: none; width: 900px; height: 580px; background: white; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); overflow: hidden; flex-direction: row; }

    /* Sidebar */
    #sidebar { width: 240px; background: #1a1a2e; display: flex; flex-direction: column; }
    #sidebar-header { padding: 16px; color: white; font-weight: bold; font-size: 16px; border-bottom: 1px solid #2d2d4e; }
    #room-list { flex: 1; overflow-y: auto; padding: 8px 0; }
    .room-item { padding: 10px 16px; color: #a0a0c0; cursor: pointer; font-size: 14px; border-radius: 6px; margin: 2px 8px; }
    .room-item:hover { background: #2d2d4e; color: white; }
    .room-item.active { background: #4f46e5; color: white; }
    #new-room-area { padding: 12px; border-top: 1px solid #2d2d4e; }
    #new-room-input { width: 100%; padding: 8px 10px; border-radius: 6px; border: none; background: #2d2d4e; color: white; font-size: 13px; }
    #new-room-input::placeholder { color: #6b6b8a; }
    #btn-create-room { width: 100%; margin-top: 6px; padding: 8px; background: #4f46e5; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
    #user-info { padding: 12px 16px; color: #6b6b8a; font-size: 12px; border-top: 1px solid #2d2d4e; }

    /* Chat area */
    #chat-area { flex: 1; display: flex; flex-direction: column; }
    #chat-header { padding: 16px 20px; border-bottom: 1px solid #e5e7eb; font-weight: bold; color: #1a1a2e; font-size: 15px; }
    #messages { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 10px; }
    .msg { max-width: 70%; }
    .msg.mine { align-self: flex-end; }
    .msg.others { align-self: flex-start; }
    .msg-sender { font-size: 12px; color: #6b7280; margin-bottom: 3px; }
    .msg-bubble { padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.4; word-break: break-word; }
    .msg.mine .msg-bubble { background: #4f46e5; color: white; border-bottom-right-radius: 3px; }
    .msg.others .msg-bubble { background: #f3f4f6; color: #1a1a2e; border-bottom-left-radius: 3px; }
    .msg-time { font-size: 11px; color: #9ca3af; margin-top: 3px; text-align: right; }
    #input-area { padding: 16px 20px; border-top: 1px solid #e5e7eb; display: flex; gap: 10px; }
    #msg-input { flex: 1; padding: 10px 14px; border: 1px solid #d1d5db; border-radius: 24px; font-size: 14px; outline: none; }
    #msg-input:focus { border-color: #4f46e5; }
    #btn-send { padding: 10px 20px; background: #4f46e5; color: white; border: none; border-radius: 24px; cursor: pointer; font-size: 14px; }
    #placeholder { flex: 1; display: flex; align-items: center; justify-content: center; color: #9ca3af; font-size: 14px; }
  </style>
</head>
<body>

<!-- Login screen -->
<div id="auth-panel">
  <h2>💬 Chat Room</h2>
  <input id="username" type="text" placeholder="Username" />
  <input id="email" type="email" placeholder="Email (required for registration)" />
  <input id="password" type="password" placeholder="Password" />
  <button id="btn-login">Login</button>
  <button id="btn-register">Create Account</button>
  <div id="auth-error"></div>
</div>

<!-- Main UI -->
<div id="app">
  <div id="sidebar">
    <div id="sidebar-header">Rooms</div>
    <div id="room-list"></div>
    <div id="new-room-area">
      <input id="new-room-input" type="text" placeholder="New room name..." />
      <button id="btn-create-room">+ Create Room</button>
    </div>
    <div id="user-info"></div>
  </div>
  <div id="chat-area">
    <div id="chat-header">Select a room to start chatting</div>
    <div id="placeholder">← Select a room from the left</div>
    <div id="messages" style="display:none"></div>
    <div id="input-area" style="display:none">
      <input id="msg-input" type="text" placeholder="Type a message..." />
      <button id="btn-send">Send</button>
    </div>
  </div>
</div>

<script>
  const API = 'http://localhost:8080';
  let token = null;
  let username = null;
  let stompClient = null;
  let currentRoomId = null;
  let currentSub = null;

  // Auth
  document.getElementById('btn-login').onclick = () => auth('login');
  document.getElementById('btn-register').onclick = () => auth('register');
  document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') auth('login'); });

  async function auth(type) {
    const u = document.getElementById('username').value.trim();
    const p = document.getElementById('password').value.trim();
    const e = document.getElementById('email').value.trim();
    if (!u || !p) return showError('Please enter username and password.');

    const body = type === 'register' ? { username: u, email: e, password: p } : { username: u, password: p };
    const url = `${API}/api/auth/${type}`;

    try {
      const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
      const data = await res.json();
      if (!res.ok) return showError(data.message || 'Failed. Please try again.');
      token = data.token;
      username = u;
      document.getElementById('auth-panel').style.display = 'none';
      document.getElementById('app').style.display = 'flex';
      document.getElementById('user-info').textContent = `👤 ${username}`;
      loadRooms();
      connectWebSocket();
    } catch {
      showError('Unable to connect to server.');
    }
  }

  function showError(msg) {
    document.getElementById('auth-error').textContent = msg;
  }

  // Rooms
  async function loadRooms() {
    const res = await fetch(`${API}/api/rooms`, { headers: { Authorization: `Bearer ${token}` } });
    const rooms = await res.json();
    renderRooms(rooms);
  }

  function renderRooms(rooms) {
    const list = document.getElementById('room-list');
    list.innerHTML = '';
    rooms.forEach(r => {
      const div = document.createElement('div');
      div.className = 'room-item' + (r.id === currentRoomId ? ' active' : '');
      div.textContent = '# ' + r.name;
      div.onclick = () => joinRoom(r.id, r.name);
      list.appendChild(div);
    });
  }

  document.getElementById('btn-create-room').onclick = async () => {
    const name = document.getElementById('new-room-input').value.trim();
    if (!name) return;
    await fetch(`${API}/api/rooms`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
      body: JSON.stringify({ name, description: '' })
    });
    document.getElementById('new-room-input').value = '';
    loadRooms();
  };

  // WebSocket
  function connectWebSocket() {
    stompClient = new StompJs.Client({
      brokerURL: `ws://localhost:8080/ws?token=${token}`,
      reconnectDelay: 5000,
    });
    stompClient.activate();
  }

  function joinRoom(roomId, roomName) {
    currentRoomId = roomId;
    document.getElementById('chat-header').textContent = '# ' + roomName;
    document.getElementById('placeholder').style.display = 'none';
    document.getElementById('messages').style.display = 'flex';
    document.getElementById('input-area').style.display = 'flex';
    document.getElementById('messages').innerHTML = '';

    // 更新 active 狀態
    document.querySelectorAll('.room-item').forEach(el => {
      el.classList.toggle('active', el.textContent === '# ' + roomName);
    });

    // 取消上一個訂閱
    if (currentSub) currentSub.unsubscribe();

    // 載入歷史訊息
    loadHistory(roomId);

    // 訂閱新房間
    if (stompClient && stompClient.connected) {
      subscribe(roomId);
    } else {
      stompClient.onConnect = () => subscribe(roomId);
    }
  }

  function subscribe(roomId) {
    currentSub = stompClient.subscribe(`/topic/room/${roomId}`, msg => {
      const data = JSON.parse(msg.body);
      appendMessage(data, false);
    });
  }

  async function loadHistory(roomId) {
    const res = await fetch(`${API}/api/rooms/${roomId}/messages`, { headers: { Authorization: `Bearer ${token}` } });
    const msgs = await res.json();
    const container = document.getElementById('messages');
    container.innerHTML = '';
    msgs.forEach(m => appendMessage(m, true));
  }

  function appendMessage(msg, isHistory) {
    const container = document.getElementById('messages');
    const isMine = (msg.senderUsername || msg.sender) === username;
    const div = document.createElement('div');
    div.className = 'msg ' + (isMine ? 'mine' : 'others');

    const time = new Date(msg.createdAt).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
    div.innerHTML = `
      ${!isMine ? `<div class="msg-sender">${msg.senderUsername || msg.sender}</div>` : ''}
      <div class="msg-bubble">${escapeHtml(msg.content)}</div>
      <div class="msg-time">${time}</div>
    `;
    container.appendChild(div);
    if (!isHistory) container.scrollTop = container.scrollHeight;
  }

  // Send message
  document.getElementById('btn-send').onclick = sendMessage;
  document.getElementById('msg-input').addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });

  function sendMessage() {
    const input = document.getElementById('msg-input');
    const content = input.value.trim();
    if (!content || !currentRoomId || !stompClient?.connected) return;
    stompClient.publish({
      destination: `/app/chat/${currentRoomId}`,
      body: JSON.stringify({ content })
    });
    input.value = '';
  }

  function escapeHtml(text) {
    return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
