version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: chatroom-postgres
    environment:
      POSTGRES_DB: chatroom
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: chatroom-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/chatroom
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      JWT_SECRET: change-me-in-production-must-be-at-least-256-bits-long
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
